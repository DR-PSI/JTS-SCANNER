<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTS Stock Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#0d1117; color:#e6edf3; min-height:100vh; }
  .header { background:#161b22; border-bottom:1px solid #30363d; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:20px; font-weight:600; color:#58a6ff; }
  .meta { font-size:12px; color:#8b949e; }
  .stats { display:flex; gap:16px; padding:20px 24px; }
  .stat-card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px 24px; flex:1; }
  .stat-card .label { font-size:12px; color:#8b949e; margin-bottom:8px; }
  .stat-card .value { font-size:28px; font-weight:700; }
  .stat-card.buy .value { color:#3fb950; }
  .stat-card.sell .value { color:#f85149; }
  .stat-card.total .value { color:#58a6ff; }
  .filters { padding:0 24px 16px; display:flex; gap:8px; }
  .btn { padding:6px 16px; border-radius:6px; border:1px solid #30363d; background:#21262d; color:#e6edf3; cursor:pointer; font-size:13px; transition:all 0.2s; }
  .btn:hover { border-color:#58a6ff; color:#58a6ff; }
  .btn.active { background:#1f6feb; border-color:#1f6feb; color:white; }
  .btn.buy-btn.active { background:#238636; border-color:#238636; }
  .btn.sell-btn.active { background:#da3633; border-color:#da3633; }
  .table-wrap { padding:0 24px 24px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { padding:10px 16px; text-align:left; font-size:12px; color:#8b949e; border-bottom:1px solid #30363d; }
  td { padding:10px 16px; border-bottom:1px solid #21262d; vertical-align:middle; }
  tr:hover td { background:#161b22; }
  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
  .badge.buy  { background:#0d4a1e; color:#3fb950; border:1px solid #238636; }
  .badge.sell { background:#4a0d0d; color:#f85149; border:1px solid #da3633; }
  .symbol { font-weight:600; color:#58a6ff; cursor:pointer; }
  .symbol:hover { text-decoration:underline; }
  .chart-btn { padding:4px 10px; border-radius:6px; border:1px solid #30363d; background:#21262d; color:#8b949e; cursor:pointer; font-size:12px; }
  .chart-btn:hover { border-color:#58a6ff; color:#58a6ff; }
  .line-btn { padding:4px 10px; border-radius:6px; border:1px solid #238636; background:#0d4a1e; color:#3fb950; cursor:pointer; font-size:12px; }
  .line-btn:hover { background:#238636; color:white; }
  .line-btn.sent { border-color:#58a6ff; background:#1f3a5c; color:#58a6ff; }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; padding:16px; }
  .modal-bg.show { display:flex; }
  .modal { background:#161b22; border:1px solid #30363d; border-radius:12px; width:100%; max-width:960px; max-height:90vh; overflow-y:auto; }
  .modal-header { padding:16px 20px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; }
  .modal-title { font-size:18px; font-weight:600; color:#58a6ff; }
  .modal-close { background:none; border:none; color:#8b949e; font-size:20px; cursor:pointer; }
  .modal-close:hover { color:#e6edf3; }
  .modal-body { padding:20px; }
  .chart-container { position:relative; height:280px; margin-bottom:16px; }
  .chart-label { font-size:12px; color:#8b949e; margin-bottom:8px; }
  .loading { text-align:center; padding:60px; color:#8b949e; }
  .refresh-btn { background:#21262d; border:1px solid #30363d; color:#e6edf3; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .toast { position:fixed; bottom:24px; right:24px; background:#238636; color:white; padding:12px 20px; border-radius:8px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; }
  .toast.error { background:#da3633; }
  @media(max-width:600px) { .stats{flex-direction:column;} .header h1{font-size:16px;} }
</style>
</head>

let currentFilter = 'ALL';
let priceChartInst = null;
let macdChartInst  = null;

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  try {
    const res  = await fetch('scanner-data.json?t=' + Date.now());
    const data = await res.json();
    allData = data.stocks || [];
    document.getElementById('last-update').textContent = 'อัปเดต: ' + (data.updated || '-');
    updateStats();
    renderTable(currentFilter);
  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ ไม่พบข้อมูล';
  }
}

function updateStats() {
  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('buy-count').textContent   = allData.filter(r=>r.position==='BUY').length;
  document.getElementById('sell-count').textContent  = allData.filter(r=>r.position==='SELL').length;
}

function filterData(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(filter);
}

function renderTable(filter) {
  let rows = allData.filter(r=>r.position!=='NONE');
  if(filter==='BUY')  rows = rows.filter(r=>r.position==='BUY');
  if(filter==='SELL') rows = rows.filter(r=>r.position==='SELL');
  rows.sort((a,b)=>{
    if(a.new&&!b.new) return -1;
    if(!a.new&&b.new) return 1;
    return b.date.localeCompare(a.date);
  });
  document.getElementById('table-body').innerHTML = rows.map((r,i) => `
    <tr>
      <td style="color:#8b949e">${i+1}</td>
      <td class="symbol" onclick="showChart('${r.symbol}')">${r.symbol} 🕯️</td>
      <td><span class="badge ${r.position.toLowerCase()}">${r.position==='BUY'?'⚠️ Ready to Buy':'🔴 Ready to Sell'}</span></td>
      <td style="font-weight:500">${r.price.toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
      <td style="color:#8b949e;font-size:13px">${r.date}</td>
      <td>${r.new?'🆕 ใหม่!':''}</td>
      <td><button class="chart-btn" onclick="showChart('${r.symbol}')">📊 ดูกราฟ</button></td>
      <td><button class="line-btn" id="btn-${r.symbol}" onclick="sendLine('${r.symbol}','${r.position}',${r.price},'${r.date}',this)">📲 ส่ง LINE</button></td>
    </tr>
  `).join('');
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-table').style.display = 'table';
}

function showChart(symbol) {
  const stock = allData.find(r=>r.symbol===symbol);
  if(!stock || !stock.chart) return;
  const c = stock.chart;

  document.getElementById('modal-title').textContent =
    `🕯️ ${symbol} — ${stock.position==='BUY'?'⚠️ Ready to Buy':'🔴 Ready to Sell'}`;
  document.getElementById('modal-bg').classList.add('show');

  // แปลง dates เป็น timestamp สำหรับ candlestick
  const candleData = c.dates.map((d,i) => ({
    x: new Date(d + '-01').getTime(),
    o: c.open[i],
    h: c.high[i],
    l: c.low[i],
    c: c.close[i]
  }));

  const ema12Data  = c.dates.map((d,i) => ({ x: new Date(d+'-01').getTime(), y: c.ema12[i] }));
  const ema26Data  = c.dates.map((d,i) => ({ x: new Date(d+'-01').getTime(), y: c.ema26[i] }));

  const buyPts  = (c.signals||[]).filter(s=>s.type==='BUY').map(s=>({ x: new Date(s.date+'-01').getTime(), y: s.price }));
  const sellPts = (c.signals||[]).filter(s=>s.type==='SELL').map(s=>({ x: new Date(s.date+'-01').getTime(), y: s.price }));

  if(priceChartInst) priceChartInst.destroy();
  priceChartInst = new Chart(document.getElementById('price-chart'), {
    type: 'candlestick',
    data: {
      datasets: [
        {
          label: 'OHLC',
          data: candleData,
          color: { up:'#3fb950', down:'#f85149', unchanged:'#8b949e' },
          borderColor: { up:'#3fb950', down:'#f85149', unchanged:'#8b949e' },
          order: 3
        },
        {
          label: 'EMA12 🔴',
          type: 'line',
          data: ema12Data,
          borderColor: '#f85149',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          order: 2
        },
        {
          label: 'EMA26 🔵',
          type: 'line',
          data: ema26Data,
          borderColor: '#58a6ff',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          order: 2
        },
        {
          label: '🟢 Ready to Buy',
          type: 'scatter',
          data: buyPts,
          backgroundColor: '#3fb950',
          pointRadius: 10,
          pointStyle: 'triangle',
          order: 1
        },
        {
          label: '🔴 Ready to Sell',
          type: 'scatter',
          data: sellPts,
          backgroundColor: '#f85149',
          pointRadius: 10,
          pointStyle: 'triangle',
          rotation: 180,
          order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#e6edf3', font:{size:11} } } },
      scales: {
        x: {
          type: 'time',
          time: { unit:'month', displayFormats:{ month:'MMM yy' } },
          ticks: { color:'#8b949e', maxTicksLimit:12 },
          grid: { color:'#21262d' }
        },
        y: { ticks:{ color:'#8b949e' }, grid:{ color:'#21262d' } }
      }
    }
  });

  // MACD chart
  if(macdChartInst) macdChartInst.destroy();
  const macdDates = c.dates.map(d => new Date(d+'-01').getTime());
  const histColors = c.hist.map(v => v >= 0 ? 'rgba(63,185,80,0.8)' : 'rgba(248,81,73,0.8)');

  macdChartInst = new Chart(document.getElementById('macd-chart'), {
    type: 'bar',
    data: {
      labels: macdDates,
      datasets: [
        { label:'Histogram', data:c.hist, backgroundColor:histColors, borderWidth:0, order:2 },
        { label:'MACD 🔴', data:c.macd, type:'line', borderColor:'#f85149', borderWidth:1.5, pointRadius:0, tension:0.3, order:1 },
        { label:'Signal 🔵', data:c.signal, type:'line', borderColor:'#58a6ff', borderWidth:1.5, pointRadius:0, tension:0.3, order:1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#e6edf3', font:{size:11} } } },
      scales: {
        x: {
          type: 'time',
          time: { unit:'month', displayFormats:{ month:'MMM yy' } },
          ticks: { color:'#8b949e', maxTicksLimit:12 },
          grid: { color:'#21262d' }
        },
        y: { ticks:{ color:'#8b949e' }, grid:{ color:'#21262d' } }
      }
    }
  });
}

function closeModal(e) { if(e.target.id==='modal-bg') closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-bg').classList.remove('show'); }

async function sendLine(symbol, signal, price, date, btn) {
  btn.textContent='⏳...'; btn.disabled=true;
  const emoji = signal==='BUY'?'⚠️':'🔴';
  const label = signal==='BUY'?'Ready to Buy':'Ready to Sell';
  const now   = new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok'});
  try {
    const res = await fetch(N8N_WEBHOOK, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({symbol, signal, price,
        message:`${emoji} ${label} — ${symbol}\nราคา: ${price} บาท\nTimeframe: Monthly\nสัญญาณ: ${date}\nเวลา: ${now}`})
    });
    if(res.ok) { btn.classList.add('sent'); btn.textContent='✅ ส่งแล้ว'; showToast(`✅ ส่ง ${symbol} ไป LINE แล้ว!`); }
    else throw new Error();
  } catch { btn.textContent='📲 ส่ง LINE'; btn.disabled=false; showToast('❌ ส่งไม่ได้',true); }
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError?' error':'');
  setTimeout(()=>t.className='toast', 3000);
}

loadData();
setInterval(loadData, 60000);
</script>
