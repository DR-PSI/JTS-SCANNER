name: JTS MACD+CDC Scanner

on:
  schedule:
    - cron: '0 2 1 * *'    # Monthly: วันที่ 1 ของทุกเดือน 09:00 (UTC+7)
    - cron: '0 5 * * *'    # Daily: ทุกวัน 12:00 (UTC+7)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run Monthly Scanner
        if: github.event.schedule == '0 2 1 * *' || github.event_name == 'workflow_dispatch'
        run: python scanner_cdc.py

      - name: Run Daily Scanner
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: python scanner_day.py

      - name: Commit JSON files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scanner-data.json scanner-data-day.json || true
          git diff --staged --quiet || git commit -m "Update scanner data $(date +'%Y-%m-%d %H:%M')"
          git push
