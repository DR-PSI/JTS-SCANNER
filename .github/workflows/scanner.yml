name: JTS MACD+CDC Scanner

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run scanner
        run: python macd_cdc_scanner.py
